services:
  build:
    image: openaa-build:1.0.0
    build:
      context: .
      dockerfile: docker/Dockerfile.build
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    volumes:
      - .:/workspace
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"

  runtime:
    image: openaa-runtime:1.0.0
    build:
      context: .
      dockerfile: docker/Dockerfile.runtime
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    volumes:
      - .:/workspace
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"