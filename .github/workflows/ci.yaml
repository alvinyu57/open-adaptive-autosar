name: PR CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BUILD_DIR: build/Release
      TEST_RESULTS_DIR: test-results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker availability
        run: docker version

      - name: Build project with tests enabled
        run: ./build.sh --build-tests

      - name: Run clang-format check
        id: clang_format
        continue-on-error: true
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            openaa-build \
            bash -lc "./tests/lint/run_clang_format_check.sh"

      - name: Run clang-tidy check
        id: clang_tidy
        continue-on-error: true
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            openaa-build \
            bash -lc "./tests/lint/run_clang_tidy_check.sh"

      - name: Run unit tests with CTest
        id: ctest_unit
        continue-on-error: true
        run: |
          mkdir -p "${TEST_RESULTS_DIR}"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            openaa-build \
            bash -lc "
              ctest \
                --test-dir '${BUILD_DIR}' \
                -L unit \
                --output-on-failure \
                --output-junit '/workspace/${TEST_RESULTS_DIR}/unit-report.xml'
            "

      - name: Run smoke tests with CTest
        id: ctest_smoke
        continue-on-error: true
        run: |
          mkdir -p "${TEST_RESULTS_DIR}"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            openaa-build \
            bash -lc "
              ctest \
                --test-dir '${BUILD_DIR}' \
                -L smoke \
                --output-on-failure \
                --output-junit '/workspace/${TEST_RESULTS_DIR}/smoke-report.xml'
            "

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Lint Summary"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| clang-format | ${{ steps.clang_format.outcome }} |"
            echo "| clang-tidy | ${{ steps.clang_tidy.outcome }} |"
            echo "| unit tests | ${{ steps.ctest_unit.outcome }} |"
            echo "| smoke tests | ${{ steps.ctest_smoke.outcome }} |"
            echo
          } >> "${GITHUB_STEP_SUMMARY}"

          python3 scripts/ci/write_test_summary.py \
            "${TEST_RESULTS_DIR}/unit-report.xml" \
            "Unit Test Summary" \
            >> "${GITHUB_STEP_SUMMARY}"

          python3 scripts/ci/write_test_summary.py \
            "${TEST_RESULTS_DIR}/smoke-report.xml" \
            "Smoke Test Summary" \
            >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload raw test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-reports
          path: |
            test-results/unit-report.xml
            test-results/smoke-report.xml
          if-no-files-found: warn

      - name: Fail workflow when checks fail
        if: steps.clang_format.outcome == 'failure' || steps.clang_tidy.outcome == 'failure' || steps.ctest_unit.outcome == 'failure' || steps.ctest_smoke.outcome == 'failure'
        run: exit 1
